<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ACWMC Concession Menu Pricing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-header">
        <div>
          <h1>ACWMC Concession Menu Pricing</h1>
          <p>Sign in to manage concession menu prices and BrightSign feeds.</p>
        </div>
        <img src="logo.png" alt="Company logo" class="company-logo large" />
      </div>

      <div class="notice-box">
        This login is suitable for a basic staff workflow on a static GitHub Pages site. It is not a full secure backend authentication system.
      </div>

      <form id="loginForm" class="login-form">
        <label>Username<input id="username" type="text" autocomplete="username" required /></label>
        <label>Password<input id="password" type="password" autocomplete="current-password" required /></label>
        <button type="submit" class="btn btn-primary full-btn">Log In</button>
      </form>

      <div id="loginStatus" class="inline-status"></div>

      <div class="login-help">
        <strong>Default admin account</strong><br />
        Username: <code>admin</code><br />
        Password: <code>ChangeMe123!</code>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
